
  <!DOCTYPE html>
  <html lang="en">
    <head>
      <script>
        if ("scrollRestoration" in history) {
          history.scrollRestoration = "manual";
        }
        window.scrollTo(0, 0);
        document.documentElement.scrollTop = 0;
        document.body && (document.body.scrollTop = 0);
      </script>
      <meta name="color-scheme" content="dark" />
      <meta name="theme-color" content="#0a0a0a" />
      <style>
        html, body {
          background-color: #0a0a0a !important;
          margin: 0;
        }
      </style>
      <meta charset="UTF-8" />
      <meta name="viewport" content="width=device-width, initial-scale=1.0" />

      <!-- Primary SEO -->
      <title>DYSIGNS — Brand Identity, Web Design & Social Media | Amsterdam</title>
      <meta name="description" content="DYSIGNS is a Amsterdam-based design studio by Dylan Kho. We grow companies through brand identity, web design, and social media management that pulls people in." />
      <meta name="keywords" content="design studio Amsterdam, brand identity, web design, social media management, UX design, Dylan Kho, DYSIGNS" />
      <meta name="author" content="Dylan Kho — DYSIGNS" />
      <link rel="canonical" href="https://dylandysigns.com/" />
      <meta name="robots" content="index, follow" />

      <!-- Open Graph (Facebook, LinkedIn, WhatsApp previews) -->
      <meta property="og:type" content="website" />
      <meta property="og:url" content="https://dylandysigns.com/" />
      <meta property="og:title" content="DYSIGNS — Brand Identity, Web Design & Social Media | Amsterdam" />
      <meta property="og:description" content="Amsterdam design studio specialising in brand identity, web design, and social media management. We grow companies through digital experiences that pull people in." />
      <meta property="og:image" content="https://dylandysigns.com/images/og-cover.png" />
      <meta property="og:image:width" content="1200" />
      <meta property="og:image:height" content="630" />
      <meta property="og:site_name" content="DYSIGNS" />
      <meta property="og:locale" content="en_US" />

      <!-- Twitter / X card -->
      <meta name="twitter:card" content="summary_large_image" />
      <meta name="twitter:site" content="@dylandysigns" />
      <meta name="twitter:title" content="DYSIGNS — Brand Identity, Web Design & Social Media" />
      <meta name="twitter:description" content="Amsterdam design studio. Brand identity, web design, social media management — digital experiences that pull people in." />
      <meta name="twitter:image" content="https://dylandysigns.com/images/og-cover.png" />

      <!-- Structured data — Person + Organization (helps Google & AI understand who you are) -->
      <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Person",
            "@id": "https://dylandysigns.com/#person",
            "name": "Dylan Kho",
            "url": "https://dylandysigns.com",
            "jobTitle": "Designer & Developer",
            "worksFor": { "@id": "https://dylandysigns.com/#organization" },
            "sameAs": [
              "https://www.instagram.com/dylan.kho"
            ]
          },
          {
            "@type": "Organization",
            "@id": "https://dylandysigns.com/#organization",
            "name": "DYSIGNS",
            "url": "https://dylandysigns.com",
            "logo": "https://dylandysigns.com/favicon.png",
            "description": "Amsterdam design studio specialising in brand identity, web design, and social media management.",
            "address": {
              "@type": "PostalAddress",
              "addressLocality": "Amsterdam",
              "addressCountry": "NL"
            },
            "contactPoint": {
              "@type": "ContactPoint",
              "email": "hello@dylandysigns.com",
              "contactType": "customer service"
            },
            "sameAs": [
              "https://www.instagram.com/dylan.kho"
            ]
          },
          {
            "@type": "WebSite",
            "@id": "https://dylandysigns.com/#website",
            "url": "https://dylandysigns.com",
            "name": "DYSIGNS",
            "publisher": { "@id": "https://dylandysigns.com/#organization" }
          }
        ]
      }
      </script>

      <link rel="icon" type="image/png" href="/favicon.png" />
      <link rel="apple-touch-icon" href="/favicon.png" />
    </head>

    <body>
      <div id="root"></div>
      <script type="module" src="/src/main.tsx"></script>
    </body>
  </html>
